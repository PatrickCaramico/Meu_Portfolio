<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2d35"/>
      <stop offset="100%" stop-color="#121418"/>
    </linearGradient>
    <linearGradient id="gradText" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffaf4d"/>
      <stop offset="100%" stop-color="#ff8a00"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo escuro levemente arredondado -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  
  <!-- Bordinha sutil estilo glassmorphism -->
  <rect width="100" height="100" rx="24" fill="transparent" stroke="#ff8a00" stroke-width="2" stroke-opacity="0.5"/>
  
  <!-- Letra P estilizada -->
  <text x="46" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" text-anchor="middle" fill="url(#gradText)">P</text>
  
  <!-- Ponto laranja de destaque remetendo ao "Patrick.dev" -->
  <circle cx="76" cy="70" r="8" fill="#ff8a00"/>
</svg>
